<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薬剤師市場価値診断</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <section id="start-screen" class="start">
    <img src="images" class="hero-image" alt="薬剤師市場価値診断">

    <button class="start-button" onclick="startQuiz()">
      診断を始める
    </button>
  </section>

  <section id="quiz-screen" class="card" style="display:none;">
    <div class="progress">
      <div id="progress-text"></div>
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>

    <h1 id="question"></h1>
    <div id="answers"></div>

    <button id="back-button" class="back-button" onclick="goBack()">
      ← 前の質問に戻る
    </button>
  </section>

  <section id="result-screen" class="card result" style="display:none;">
    <p class="result-label">あなたの市場価値</p>
    <h1 id="rank-result"></h1>

    <div id="salary-result" class="salary"></div>
    <p id="comment" class="comment"></p>

    <div class="job-box">
      <h2>狙える求人イメージ</h2>
      <ul id="job-list"></ul>
    </div>

    <div class="lead-box">
      <h2>さらに詳しい求人情報を知りたい方へ</h2>
      <p>
        診断結果をもとに、薬剤師専門アドバイザーが<br>
        非公開求人や年収アップの可能性を無料でご案内します。
      </p>

      <a href="https://line.me" target="_blank">
        <button class="line-button">LINEで無料相談する</button>
      </a>
    </div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
